name: 'Production'
run-name: 'Production - ${{ github.ref_name }}'

on:
  workflow_call:
    inputs:
      contract-file:
        description: 'Path to CI contract file'
        type: string
        default: '.github/config/ci.yaml'
        required: false

jobs:
  retrieve-contract:
    runs-on: ubuntu-latest
    outputs:
      configuration: ${{ steps.parse-contract.outputs.contract }}
      release-version: ${{ steps.set-version.outputs.release-version }}
      sha-short: ${{ steps.set-sha.outputs.sha-short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA
        id: set-sha
        run: echo "sha-short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set date
        id: set-date
        run: echo "date-time=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
      
      - name: Set version
        id: set-version
        run: echo "release-version=${{ format('1.{0}.{1}-{2}-{3}', steps.set-date.outputs.date-time, github.run_number, github.ref_name, steps.set-sha.outputs.sha-short) }}" >> "$GITHUB_OUTPUT"
      
      - name: Parse CI contract
        id: parse-contract
        run: |
          FILE="${{ inputs.contract-file }}"

          if [ ! -f "$FILE" ]; then
            echo "File not found: $FILE"
            exit 1
          fi

          {
            echo "contract<<EOF"
            yq -o=json '.' "$FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  docker-and-helm:
    name: 'docker-and-helm (${{ matrix.app.name }})'
    runs-on: ubuntu-latest
    needs: retrieve-contract
    strategy:
      fail-fast: true
      matrix:
        app: ${{ fromJson(needs.retrieve-contract.outputs.configuration).apps }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set environment variables
        id: set-env
        run: |
          APP_JSON='${{ toJson(matrix.app) }}'
          BUILD_CONFIG=$(echo "$APP_JSON" | jq -c '.cicd.workflows.jobs["build-and-unit-test"]')
          CONTAINERIZE_CONFIG=$(echo "$APP_JSON" | jq -c '.cicd.workflows.jobs["containerize-and-package"]')
          echo "BUILD_CONFIG=$BUILD_CONFIG" >> $GITHUB_ENV
          echo "CONTAINERIZE_CONFIG=$CONTAINERIZE_CONFIG" >> $GITHUB_ENV
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set common variables
        id: set-vars
        run: |
          echo "go-version=$(echo "$BUILD_CONFIG" | jq -r '."go-version"')" >> "$GITHUB_OUTPUT"
          echo "dockerfile-path=$(echo "$CONTAINERIZE_CONFIG" | jq -r '."dockerfile-path"')" >> "$GITHUB_OUTPUT"
          echo "registry=$(echo "$CONTAINERIZE_CONFIG" | jq -r '."registry"')" >> "$GITHUB_OUTPUT"
          echo "image-name=$(echo "$CONTAINERIZE_CONFIG" | jq -r '."image-name"')" >> "$GITHUB_OUTPUT"
          echo "release-version=${{ needs.retrieve-contract.outputs.release-version }}" >> "$GITHUB_OUTPUT"
          echo "chart-path=$(echo "$CONTAINERIZE_CONFIG" | jq -r '."chart-path"')" >> "$GITHUB_OUTPUT"
    
      - name: 'Setup Go ${{ steps.set-vars.outputs.go-version }}'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.set-vars.outputs.go-version }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.set-vars.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.set-vars.outputs.registry }}/${{ steps.set-vars.outputs.image-name }}:${{ steps.set-vars.outputs.release-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Update image tag in values.yaml (${{ matrix.app.name }})
        run: |
          sed -i "s|^  repository: .*|  repository: ${{ steps.set-vars.outputs.registry }}/${{ steps.set-vars.outputs.image-name }}|" ${{ steps.set-vars.outputs.chart-path }}/values.yaml
          sed -i "s|^  tag: .*|  tag: ${{ steps.set-vars.outputs.release-version }}|" ${{ steps.set-vars.outputs.chart-path }}/values.yaml
      
      - name: Update Chart.yaml version (${{ matrix.app.name }})
        run: |
          sed -i "s|^  version: .*|  version: ${{ steps.set-vars.outputs.release-version }}|" ${{ steps.set-vars.outputs.chart-path }}/Chart.yaml
      
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Login to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ steps.set-vars.outputs.registry }} -u ${{ github.actor }} --password-stdin
      
      - name: Helm package 
        run: |
          helm package ${{ steps.set-vars.outputs.chart-path }} --version "${{ steps.set-vars.outputs.release-version }}"

      - name: Push Helm chart to GHCR
        run: |
          helm push ${{ matrix.app.name }}-${{ steps.set-vars.outputs.release-version }}.tgz oci://${{ steps.set-vars.outputs.registry }}/${{ github.repository_owner }}/charts
      
      
