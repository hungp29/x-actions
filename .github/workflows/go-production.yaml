name: 'Production'
run-name: 'Production - ${{ github.ref_name }}'

on:
  workflow_call:
    inputs:
      contract-file:
        description: 'Path to CI contract file'
        type: string
        default: '.github/config/ci.yaml'
        required: false

jobs:
  retrieve-contract:
    runs-on: ubuntu-latest
    outputs:
      configuration: ${{ steps.parse-contract.outputs.contract }}
      release-version: ${{ steps.set-version.outputs.release-version }}
      sha-short: ${{ steps.set-sha.outputs.sha-short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA
        id: set-sha
        run: echo "sha-short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set date
        id: set-date
        run: echo "date-time=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
      
      - name: Set version
        id: set-version
        run: echo "release-version=${{ format('1.{0}.{1}-{2}-{3}', steps.set-date.outputs.date-time, github.run_number, github.ref_name, steps.set-sha.outputs.sha-short) }}" >> "$GITHUB_OUTPUT"
      
      - name: Parse CI contract
        id: parse-contract
        run: |
          FILE="${{ inputs.contract-file }}"

          if [ ! -f "$FILE" ]; then
            echo "File not found: $FILE"
            exit 1
          fi

          {
            echo "contract<<EOF"
            yq -o=json '.' "$FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  docker-and-helm:
    name: 'docker-and-helm (${{ matrix.app.name }})'
    runs-on: ubuntu-latest
    needs: retrieve-contract
    strategy:
      fail-fast: true
      matrix:
        app: ${{ fromJson(needs.retrieve-contract.outputs.configuration).apps }}
    steps:
      - name: Set environment variables
        id: set-env
        run: |
          APP_JSON='${{ toJson(matrix.app) }}'
          BUILD_CONFIG=$(echo "$APP_JSON" | jq -c '.cicd.workflows.jobs["build-and-unit-test"]')
          echo "BUILD_CONFIG=$BUILD_CONFIG" >> $GITHUB_ENV
      - name: Checkout repository
        uses: actions/checkout@v4
    
